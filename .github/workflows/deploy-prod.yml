name: Deploy Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # Auto-promote to prod after a successful beta deploy on main.
  workflow_run:
    workflows: ["Deploy Beta"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/prod
  AWS_ROLE_ARN: arn:aws:iam::616938645090:role/PropelTerraform

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    # Requires manual approval when the `production` Environment has required
    # reviewers configured in the repo settings.
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Generic config: forward every GitHub Actions variable to subsequent
      # steps as env (used by the SPA build, e.g. VITE_*/POSTHOG_*).
      - name: Forward Actions variables to env
        run: |
          echo '${{ toJSON(vars) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # Same variables become the API container's environment via Terraform.
      - name: Generate app config from Actions variables
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo '{"app_environment": ${{ toJSON(vars) }}}' > app.auto.tfvars.json

      # The prod role assumes the beta role (read-only) to delegate
      # beta.propel.ninja from the parent zone during apply.
      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push & deploy API
        run: ./scripts/deploy-api.sh prod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & publish frontend
        run: ./scripts/deploy-frontend.sh prod
