name: Deploy Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # Auto-promote to prod after a successful beta deploy on main.
  workflow_run:
    workflows: ["Deploy Beta"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/prod
  AWS_ROLE_ARN: arn:aws:iam::616938645090:role/PropelTerraform

jobs:
  config:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    # Approval gate + environment-scoped Actions variables.
    environment: prod
    outputs:
      app_vars: ${{ toJSON(vars) }}
    steps:
      - run: echo "Loaded prod environment variables"

  deploy:
    needs: config
    runs-on: ubuntu-latest
    # OIDC subject must be environment:prod (see prod-trust.json). Unlike beta,
    # do not rely on refs/heads/main — workflow_run and workflow_dispatch refs
    # are not always main. Approval already ran on config; same environment
    # does not require a second gate in one workflow run.
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forward Actions variables to env
        run: |
          echo '${{ needs.config.outputs.app_vars }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Generate app config from Actions variables
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo '{"app_environment": ${{ needs.config.outputs.app_vars }} }' > app.auto.tfvars.json

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push & deploy API
        run: ./scripts/deploy-api.sh prod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: ./scripts/npm-ci.sh frontend

      - name: Build & publish frontend
        env:
          SKIP_NPM_CI: "1"
        run: ./scripts/deploy-frontend.sh prod

      - name: Build & publish landing
        env:
          SKIP_NPM_CI: "1"
        run: ./scripts/deploy-landing.sh prod
