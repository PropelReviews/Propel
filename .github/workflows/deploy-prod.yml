name: Deploy Prod

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
  # Auto-promote to prod after a successful beta deploy on main.
  workflow_run:
    workflows: ["Deploy Beta"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/prod
  AWS_ROLE_ARN: arn:aws:iam::616938645090:role/PropelTerraform

jobs:
  config:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    # Approval gate + environment-scoped Actions variables and secrets.
    environment: prod
    outputs:
      app_vars: ${{ toJSON(vars) }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Terraform app config
        env:
          APP_ENVIRONMENT_JSON: ${{ toJSON(vars) }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          OAUTH_LINEAR_CLIENT_SECRET: ${{ secrets.OAUTH_LINEAR_CLIENT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.GH_APP_WEBHOOK_SECRET }}
          GITHUB_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          GITHUB_APP_CLIENT_SECRET: ${{ secrets.GH_APP_CLIENT_SECRET }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          # Lifted into the top-level zitadel_mgmt_token tfvar (not app_secrets).
          # Empty before the instance's first boot keeps the placeholder so the
          # EFS-minted PAT is not clobbered (see api/zitadel_secrets.tf).
          ZITADEL_MGMT_TOKEN: ${{ secrets.ZITADEL_MGMT_TOKEN }}
          DAGSTER_ALLOWED_CIDRS: ${{ vars.DAGSTER_ALLOWED_CIDRS }}
        run: ./scripts/generate-app-tfvars.sh terraform-app-config.json

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-app-config
          path: terraform-app-config.json
          retention-days: 1

  deploy:
    needs: config
    runs-on: ubuntu-latest
    # OIDC subject must be environment:prod (see prod-trust.json). Unlike beta,
    # do not rely on refs/heads/main — workflow_run and workflow_dispatch refs
    # are not always main. Approval already ran on config; same environment
    # does not require a second gate in one workflow run.
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/download-artifact@v4
        with:
          name: terraform-app-config

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forward Actions variables to env
        run: |
          echo '${{ needs.config.outputs.app_vars }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install Terraform app config
        run: cp terraform-app-config.json "${{ env.TF_DIR }}/app.auto.tfvars.json"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      # Provision/refresh the shared Zitadel instance: the "Propel Prod" OIDC
      # app, GitHub IdP, login branding, and the human super-admin; then publish
      # the client id/secret into prod's Secrets Manager before the API rolls.
      # Opt-in via the ZITADEL_ENABLED Actions variable.
      - name: Provision Zitadel OIDC app + instance config
        if: vars.ZITADEL_ENABLED == 'true'
        env:
          ZITADEL_MGMT_TOKEN: ${{ secrets.ZITADEL_MGMT_TOKEN }}
          GITHUB_APP_CLIENT_ID: ${{ vars.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_APP_CLIENT_SECRET: ${{ secrets.GH_APP_CLIENT_SECRET }}
          ZITADEL_ADMIN_EMAIL: ${{ vars.ZITADEL_ADMIN_EMAIL }}
        run: ./scripts/deploy-zitadel.sh prod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push & deploy API
        run: ./scripts/deploy-api.sh prod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & publish frontend
        run: ./scripts/deploy-frontend.sh prod

      - name: Build & publish landing
        run: ./scripts/deploy-landing.sh prod
