name: CI

# Pre-merge checks: formatting, linting, tests, and builds.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Format check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Validate beta
        working-directory: infrastructure/terraform/environments/beta
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate prod
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false -input=false
          terraform validate

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      APP_ENV: test
      SESSION_SECRET: test-secret
      TOKEN_ENCRYPTION_KEY: iqHnNRvDhs_n1rp2O6nMgbrerNt1cjcvCkBHg543YVc=
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run pytest
        run: uv run pytest

  ingestion-integration:
    name: Ingestion integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      # target-propel reads the sync DSN from PROPEL_DATABASE_URL.
      PROPEL_DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      APP_ENV: test
      SESSION_SECRET: test-secret
      TOKEN_ENCRYPTION_KEY: iqHnNRvDhs_n1rp2O6nMgbrerNt1cjcvCkBHg543YVc=
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install API deps (for Alembic)
        run: uv sync

      - name: Migrate ingestion schema
        run: uv run alembic upgrade head

      # Install the Meltano target (singer-sdk + psycopg) into the same venv so
      # its tests — pure envelope mappers, DB writers, and the end-to-end Singer
      # stream → Postgres test — can run.
      - name: Install target-propel
        run: uv pip install -e meltano/target-propel

      # --no-sync so uv does not reconcile the venv back to the lockfile and drop
      # the editable target-propel install from the previous step.
      - name: Run target-propel tests
        run: uv run --no-sync pytest meltano/target-propel/tests -v

  dbt:
    name: dbt checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DBT_HOST: localhost
      DBT_PORT: "5432"
      DBT_USER: propel
      DBT_PASSWORD: propel
      DBT_DBNAME: propel_test
      PGPASSWORD: propel
    defaults:
      run:
        working-directory: transformation/dbt
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # Same dbt pins as orchestration/pyproject.toml so CI matches what
      # Dagster runs in production. The runner's Python is externally managed
      # (PEP 668), so install into a uv venv and put it on PATH.
      - name: Install dbt + sqlfluff
        run: |
          uv venv .ci-venv
          uv pip install --python .ci-venv/bin/python "dbt-postgres>=1.8,<2" "sqlfluff>=3,<4"
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"

      - name: Lint SQL (sqlfluff)
        run: sqlfluff lint models

      - name: Parse project
        run: dbt parse --project-dir . --profiles-dir .

      - name: Load raw_record fixture
        run: psql -h localhost -U propel -d propel_test -v ON_ERROR_STOP=1 -f ci/fixture_raw_record.sql

      - name: Build models + run dbt tests (full refresh)
        run: dbt build --full-refresh --project-dir . --profiles-dir .

      # Exercise the tenant-scoped incremental path Dagster uses in production.
      - name: Build models + run dbt tests (tenant-scoped incremental)
        run: >-
          dbt build --vars "tenant_id: aaaaaaaa-0000-0000-0000-000000000001"
          --project-dir . --profiles-dir .

      - name: Smoke-check mart output
        run: psql -h localhost -U propel -d propel_test -v ON_ERROR_STOP=1 -f ci/smoke_check.sql

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Vitest browser-mode tests (chart components) run in headless Chromium,
      # which isn't present on a fresh runner. Install it plus its OS libraries.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build landing
        run: npm run build:landing
