name: CI

# Pre-merge checks: formatting, linting, tests, and builds.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Format check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Validate beta
        working-directory: infrastructure/terraform/environments/beta
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Validate prod
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false -input=false
          terraform validate

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      JWT_SECRET: test-secret
      AUTH_REGISTRATION_ENABLED: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Run pytest
        run: uv run pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      # Vitest browser-mode tests (chart components) run in headless Chromium,
      # which isn't present on a fresh runner. Install it plus its OS libraries.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build landing
        run: npm run build:landing
