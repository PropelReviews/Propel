name: CI

# Pre-merge checks: formatting, linting, tests, builds, and a single aggregate
# ``CI success`` job. Require that job (and only that job) in branch protection
# so PRs cannot merge to main until every check below is green.
# See docs/deployment/cicd.md § Branch protection.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Format check
        working-directory: infrastructure/terraform
        run: terraform fmt -check -recursive

      - name: Validate prod
        working-directory: infrastructure/terraform/environments/prod
        run: |
          terraform init -backend=false -input=false
          terraform validate

      # Beta env is retained for rebuilds — keep it syntactically valid too.
      - name: Validate beta
        working-directory: infrastructure/terraform/environments/beta
        run: |
          terraform init -backend=false -input=false
          terraform validate

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      JWT_SECRET: test-secret
      AUTH_REGISTRATION_ENABLED: "true"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Lockfile up to date
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run pytest
        run: uv run pytest -v --tb=short

  ingestion-integration:
    name: Ingestion integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      # target-propel reads the sync DSN from PROPEL_DATABASE_URL.
      PROPEL_DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
      JWT_SECRET: test-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install API deps (for Alembic)
        run: uv sync --frozen

      - name: Migrate ingestion schema
        run: uv run alembic upgrade head

      # Install the Meltano target (singer-sdk + psycopg) into the same venv so
      # its tests — pure envelope mappers, DB writers, and the end-to-end Singer
      # stream → Postgres test — can run.
      - name: Install target-propel
        run: uv pip install -e meltano/target-propel

      # --no-sync so uv does not reconcile the venv back to the lockfile and drop
      # the editable target-propel install from the previous step.
      - name: Run target-propel tests
        run: uv run --no-sync pytest meltano/target-propel/tests -v --tb=short

  propel-metrics:
    name: Metric config checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transformation/propel_metrics
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "transformation/propel_metrics/uv.lock"

      - name: Lockfile up to date
        run: uv lock --check

      - name: Install propel-metrics
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      # Unit + fixture tests: schema/catalog self-check, invalid YAML corpus,
      # semantic/graph edge cases, compile determinism + inventory.
      - name: Pytest
        run: uv run pytest -v --tb=short

      # Aggregate gate: validate --strict + compile --check (drift + inventory)
      - name: propel-metrics ci
        run: uv run propel-metrics ci

  dbt:
    name: dbt checks
    runs-on: ubuntu-latest
    needs:
      - propel-metrics
    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: propel
          POSTGRES_PASSWORD: propel
          POSTGRES_DB: propel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DBT_HOST: localhost
      DBT_PORT: "5432"
      DBT_USER: propel
      DBT_PASSWORD: propel
      DBT_DBNAME: propel_test
      PGPASSWORD: propel
    defaults:
      run:
        working-directory: transformation/dbt
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      # Same dbt pins as orchestration/pyproject.toml so CI matches what
      # Dagster runs in production. The runner's Python is externally managed
      # (PEP 668), so install into a uv venv and put it on PATH.
      - name: Install dbt + sqlfluff
        run: |
          uv venv .ci-venv
          uv pip install --python .ci-venv/bin/python "dbt-postgres>=1.8,<2" "sqlfluff>=3,<4"
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"

      - name: Lint SQL (sqlfluff)
        run: sqlfluff lint models

      - name: Parse project
        run: dbt parse --project-dir . --profiles-dir .

      - name: Load raw_record fixture
        run: psql -h localhost -U propel -d propel_test -v ON_ERROR_STOP=1 -f ci/fixture_raw_record.sql

      - name: Build models + run dbt tests (full refresh)
        run: dbt build --full-refresh --project-dir . --profiles-dir .

      # Exercise the tenant-scoped incremental path Dagster uses in production.
      - name: Build models + run dbt tests (tenant-scoped incremental)
        run: >-
          dbt build --vars "tenant_id: aaaaaaaa-0000-0000-0000-000000000001"
          --project-dir . --profiles-dir .

      - name: Smoke-check mart output
        run: psql -h localhost -U propel -d propel_test -v ON_ERROR_STOP=1 -f ci/smoke_check.sql

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Metric types drift check
        run: npm run metrics:check-types

      - name: Metric corpus round-trip
        run: npm run metrics:roundtrip

      # Vitest browser-mode tests (chart components) run in headless Chromium,
      # which isn't present on a fresh runner. Install it plus its OS libraries.
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run unit + browser tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Build landing
        run: npm run build:landing

      # Fail only on critical advisories so transitive noise does not block merges.
      - name: Audit dependencies (critical)
        run: npm audit --audit-level=critical

  scripts:
    name: Scripts tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zitadel bootstrap unit tests
        run: python3 scripts/tests/test_zitadel_bootstrap_idp.py -v

      - name: Shell syntax (deploy / rollback)
        run: |
          set -euo pipefail
          for f in scripts/*.sh scripts/lib/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

  lint-repo:
    name: Workflow + repo lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint -version

      - name: Lint GitHub Actions workflows
        run: actionlint -color

  orchestration:
    name: Orchestration checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            orchestration/pyproject.toml
            backend/uv.lock

      - name: Install orchestration + backend runtime deps
        working-directory: orchestration
        run: |
          uv venv .ci-venv
          # Match the prod image: resolve orchestration pins together with the
          # backend runtime so Dagster can import ``app`` modules.
          uv pip install --python .ci-venv/bin/python \
            -r pyproject.toml \
            -r ../backend/pyproject.toml
          echo "$PWD/.ci-venv/bin" >> "$GITHUB_PATH"

      - name: Compile orchestration package
        env:
          PYTHONPATH: ${{ github.workspace }}/orchestration:${{ github.workspace }}/backend
        run: python -m compileall -q orchestration/propel_orchestration

      - name: Import Dagster job modules
        env:
          PYTHONPATH: ${{ github.workspace }}/orchestration:${{ github.workspace }}/backend
          POSTHOG_API_KEY: ""
          POSTHOG_HOST: ""
          DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
          JWT_SECRET: test-secret
        run: |
          python - <<'PY'
          # Lightweight smoke: job graph imports without loading analytics/dbt.
          from propel_orchestration import jobs, worker_scaling

          assert jobs.discovery_job is not None
          assert jobs.org_ingestion_job is not None
          assert callable(worker_scaling.reconcile)
          print("orchestration job modules import ok")
          PY

      # Full code-location load. Catches conflicting AssetSpecs (and similar
      # Definitions errors) that kill the ECS gRPC server and surface as
      # DagsterUserCodeUnreachableError / connection refused on :4000.
      - name: Load Dagster definitions
        env:
          PYTHONPATH: ${{ github.workspace }}/orchestration:${{ github.workspace }}/backend
          POSTHOG_API_KEY: ""
          POSTHOG_HOST: ""
          DATABASE_URL: postgresql://propel:propel@localhost:5432/propel_test
          JWT_SECRET: test-secret
          DBT_HOST: localhost
          DBT_PORT: "5432"
          DBT_USER: propel
          DBT_PASSWORD: propel
          DBT_DBNAME: propel_test
        run: |
          uv pip install --python .ci-venv/bin/python pytest
          dbt parse --project-dir ../transformation/dbt --profiles-dir ../transformation/dbt
          pytest -v --tb=short tests/test_definitions.py
        working-directory: orchestration

  docker-api:
    name: Docker API image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build (no push) catches Dockerfile / lockfile breakage before merge.
      - name: Build production API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/backend.prod.Dockerfile
          push: false
          tags: propel-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Single required status check for branch protection / rulesets.
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI success
    if: always()
    needs:
      - terraform
      - backend
      - ingestion-integration
      - propel-metrics
      - dbt
      - frontend
      - scripts
      - lint-repo
      - orchestration
      - docker-api
    runs-on: ubuntu-latest
    steps:
      - name: Verify every required job succeeded
        run: |
          set -euo pipefail
          echo '${{ toJSON(needs) }}' | jq -e '
            to_entries
            | map({job: .key, result: .value.result})
            | (map(.result) | unique) as $r
            | if ($r == ["success"]) then
                true
              else
                error("one or more CI jobs did not succeed: \(.)")
              end
          '
          echo "All CI jobs passed."
