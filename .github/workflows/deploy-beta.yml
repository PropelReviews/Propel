name: Deploy Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: the job mints a short-lived token and assumes the PropelTerraform role
# in the beta account. No long-lived AWS keys are stored in GitHub.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-beta
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/beta
  AWS_ROLE_ARN: arn:aws:iam::536270449640:role/PropelTerraform

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Binds GitHub Environment "beta" so environment-scoped Actions variables
    # (e.g. POSTHOG_TOKEN) are available via the vars context.
    environment: beta
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Generic config: forward every GitHub Actions variable to subsequent
      # steps as env (used by the SPA build, e.g. VITE_*/POSTHOG_*).
      - name: Forward Actions variables to env
        run: |
          echo '${{ toJSON(vars) }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      # Same variables become the API container's environment via Terraform.
      - name: Generate app config from Actions variables
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo '{"app_environment": ${{ toJSON(vars) }}}' > app.auto.tfvars.json

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push & deploy API
        run: ./scripts/deploy-api.sh beta

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & publish frontend
        run: ./scripts/deploy-frontend.sh beta
