name: Deploy Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: the deploy job mints a short-lived token and assumes the PropelTerraform
# role in the beta account. No long-lived AWS keys are stored in GitHub.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-beta
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_DIR: infrastructure/terraform/environments/beta
  AWS_ROLE_ARN: arn:aws:iam::536270449640:role/PropelTerraform

jobs:
  # Load GitHub Environment-scoped variables and secrets without changing the
  # OIDC subject on the deploy job (which must stay refs/heads/main for the
  # beta IAM trust).
  config:
    runs-on: ubuntu-latest
    environment: beta
    outputs:
      app_vars: ${{ toJSON(vars) }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate Terraform app config
        env:
          APP_ENVIRONMENT_JSON: ${{ toJSON(vars) }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.GH_APP_WEBHOOK_SECRET }}
          GITHUB_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          GITHUB_APP_CLIENT_SECRET: ${{ secrets.GH_APP_CLIENT_SECRET }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: ./scripts/generate-app-tfvars.sh terraform-app-config.json

      - uses: actions/upload-artifact@v4
        with:
          name: terraform-app-config
          path: terraform-app-config.json
          retention-days: 1

  deploy:
    needs: config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: terraform-app-config

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Generic config: forward every GitHub Actions variable to subsequent
      # steps as env (used by the SPA build, e.g. VITE_*/POSTHOG_*).
      - name: Forward Actions variables to env
        run: |
          echo '${{ needs.config.outputs.app_vars }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Install Terraform app config
        run: cp terraform-app-config.json "${{ env.TF_DIR }}/app.auto.tfvars.json"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, push & deploy API
        run: ./scripts/deploy-api.sh beta

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build & publish frontend
        run: ./scripts/deploy-frontend.sh beta

      - name: Build & publish landing
        run: ./scripts/deploy-landing.sh beta
