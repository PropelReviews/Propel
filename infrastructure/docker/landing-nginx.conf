# Serves the prebuilt static landing artifact (frontend/dist-landing) for local
# testing. The entry file is landing.html (not index.html) and assets are
# referenced from /assets, so this dir is served as the web root.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index landing.html;

    location / {
        try_files $uri $uri/ /landing.html;
    }
}
