version: 2

models:
  - name: fct_pr_activity_daily
    description: >
      Daily pull-request activity per tenant: PRs opened (created_at), merged
      (merged_at), and closed without merging (closed_at with no merged_at).
      Served by the backend metrics API with day/week/month bucketing.
    columns:
      - name: tenant_id
        description: Propel tenant that owns the activity.
        data_tests:
          - not_null
      - name: activity_date
        description: UTC calendar day of the activity.
        data_tests:
          - not_null
      - name: prs_opened
        data_tests:
          - not_null
      - name: prs_merged
        data_tests:
          - not_null
      - name: prs_closed
        data_tests:
          - not_null

  - name: stg_github_pull_requests
    description: Latest snapshot of every GitHub pull request (one row per PR).
    columns:
      - name: pr_node_id
        data_tests:
          - not_null

  - name: fct_tickets
    description: >
      Unified ticket entity across GitHub issues and Linear issues. One row per
      ticket per tenant with a normalized status (open, in_progress, done,
      canceled).
    columns:
      - name: tenant_id
        data_tests:
          - not_null
      - name: ticket_uid
        description: Stable key source:external_id (unique per tenant).
        data_tests:
          - not_null
          - unique
      - name: source
        data_tests:
          - not_null
          - accepted_values:
              values: ['github', 'linear']
      - name: status
        data_tests:
          - not_null
          - accepted_values:
              values: ['open', 'in_progress', 'done', 'canceled']
