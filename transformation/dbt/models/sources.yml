version: 2

sources:
  - name: propel
    description: Raw landing tables written by the ingestion pipeline (Meltano -> target-propel).
    schema: public
    tables:
      - name: raw_record
        description: >
          Append-only full payloads for every Singer stream. PR rows
          (resource_type = 'pull_requests') carry the complete GitHub PR object
          including state, created_at, closed_at, and merged_at.
        meta:
          dagster:
            # Link dbt lineage to the asset the ingestion ops already
            # materialize, so the Dagster graph is connected end to end.
            asset_key: ["github", "pull_requests"]

      - name: github_issues
        identifier: raw_record
        description: >
          GitHub issue payloads (resource_type = 'issues') from tap-github-issues.
        meta:
          dagster:
            asset_key: ["github", "issues"]

      - name: linear_issues
        identifier: raw_record
        description: >
          Linear issue payloads (resource_type = 'issues') from tap-linear.
        meta:
          dagster:
            asset_key: ["linear", "issues"]

      - name: github_reviews
        identifier: raw_record
        description: >
          GitHub pull-request review payloads (resource_type = 'reviews') from
          tap-github-pull-requests. Used for time-to-first-review primitives.
        meta:
          dagster:
            # Same Meltano job as pull_requests, but must be a distinct Dagster
            # asset key (dagster-dbt rejects duplicate keys across sources).
            asset_key: ["github", "reviews"]

      - name: github_releases
        identifier: raw_record
        description: >
          GitHub Release payloads (resource_type = 'releases') from
          tap-github-releases. Powers DORA deployment frequency.
        meta:
          dagster:
            asset_key: ["github", "releases"]

      - name: github_review_comments
        identifier: raw_record
        description: >
          GitHub pull-request review comment payloads
          (resource_type = 'pull_request_review_comments') from
          tap-github-pull-requests.
        meta:
          dagster:
            asset_key: ["github", "review_comments"]

      - name: github_workflow_runs
        identifier: raw_record
        description: >
          GitHub Actions workflow run payloads (resource_type = 'workflow_runs')
          from tap-github-workflow-runs.
        meta:
          dagster:
            asset_key: ["github", "workflow_runs"]

      - name: linear_comments
        identifier: raw_record
        description: >
          Linear comment payloads (resource_type = 'comments') from tap-linear.
        meta:
          dagster:
            asset_key: ["linear", "comments"]

      - name: linear_projects
        identifier: raw_record
        description: >
          Linear project payloads (resource_type = 'projects') from tap-linear.
        meta:
          dagster:
            asset_key: ["linear", "projects"]

      - name: linear_description_edits
        identifier: raw_record
        description: >
          Linear issue description-edit history
          (resource_type = 'issue_description_edits') from tap-linear.
        meta:
          dagster:
            asset_key: ["linear", "description_edits"]
