# A fixed project name keeps `docker compose` consistent whether it runs on the
# host (when Cursor creates the dev container) or inside the dev container via
# docker-outside-of-docker, so both manage the same containers.
name: propel

services:
  # Editor shell (Cursor devcontainer). Profile-gated so routine `docker compose up`
  # from inside this container does not recreate/restart propel-dev.
  dev:
    profiles: ["devcontainer"]
    build:
      context: .
      dockerfile: infrastructure/docker/dev.Dockerfile
      pull: true
    container_name: propel-dev
    volumes:
      # PROPEL_HOST_DIR is the host path of the repo. It is unset on the host
      # (defaults to ".") and set to the host workspace folder inside the dev
      # container, so bind mounts resolve to real host paths in both contexts.
      - ${PROPEL_HOST_DIR:-.}:/workspaces/Propel:cached
      # Docker-outside-of-docker: talk to the host daemon.
      - /var/run/docker.sock:/var/run/docker.sock
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18.3
    container_name: propel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-propel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-propel}
      POSTGRES_DB: ${POSTGRES_DB:-propel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      # PG 18+ stores data under /var/lib/postgresql/<major>/data; mount the parent dir.
      - pgdata:/var/lib/postgresql
      # Creates the `zitadel` database on first boot (no-op on existing volumes).
      - ./infrastructure/docker/zitadel-init-db.sh:/docker-entrypoint-initdb.d/02-zitadel-init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-propel} -d ${POSTGRES_DB:-propel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ensures the `zitadel` database exists before Zitadel starts. The postgres
  # entrypoint init script only runs on first volume boot; this one-shot job is
  # idempotent for existing dev volumes.
  zitadel-db-init:
    image: postgres:18.3
    container_name: propel-zitadel-db-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-propel}
      POSTGRES_DB: ${POSTGRES_DB:-propel}
      PGPASSWORD: ${POSTGRES_PASSWORD:-propel}
    volumes:
      - ./infrastructure/docker/zitadel-init-db.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    restart: "no"

  # Zitadel identity provider (OIDC). Shares the Propel Postgres instance with a
  # dedicated `zitadel` database. Login UI v2 runs in a separate container.
  zitadel:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION:-v4.13.0}
    container_name: propel-zitadel
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY:-MasterkeyNeedsToHave32Characters}" --tlsMode disabled
    env_file:
      - infrastructure/docker/zitadel-compose.env
    environment:
      ZITADEL_PORT: 8080
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_DOMAIN:-localhost}
      ZITADEL_EXTERNALPORT: ${ZITADEL_EXTERNALPORT:-8080}
      ZITADEL_EXTERNALSECURE: ${ZITADEL_EXTERNALSECURE:-false}
      ZITADEL_TLS_ENABLED: false
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://${POSTGRES_USER:-propel}:${POSTGRES_PASSWORD:-propel}@postgres:5432/zitadel?sslmode=disable
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      # IAM_OWNER machine user PAT for automated OIDC app provisioning (local dev).
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: propel-admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Propel Bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION:-2099-01-01T00:00:00Z}
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Propel Login Client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: ${LOGIN_CLIENT_PAT_EXPIRATION:-2099-01-01T00:00:00Z}
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: true
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: http://localhost:${ZITADEL_LOGIN_PORT:-3002}/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: http://localhost:${ZITADEL_LOGIN_PORT:-3002}/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: http://localhost:${ZITADEL_LOGIN_PORT:-3002}/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: http://localhost:${ZITADEL_LOGIN_PORT:-3002}/ui/v2/login/login?samlRequest=
      ZITADEL_LOGSTORE_ACCESS_STDOUT_ENABLED: true
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:rw
    ports:
      - "${ZITADEL_PORT:-8080}:8080"
      # GitHub/external IdP callbacks use http://localhost/idps/callback (port 80)
      # when Zitadel's public URL omits :8080. Map 80 → 8080 so that redirect works.
      - "127.0.0.1:80:8080"
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-db-init:
        condition: service_completed_successfully

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:${ZITADEL_VERSION:-v4.13.0}
    container_name: propel-zitadel-login
    restart: unless-stopped
    user: "0"
    env_file:
      - infrastructure/docker/zitadel-compose.env
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: Host:localhost,X-Forwarded-Proto:http
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.mjs http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 30s
    volumes:
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    ports:
      - "${ZITADEL_LOGIN_PORT:-3002}:3000"
    depends_on:
      zitadel:
        condition: service_healthy

  # One-shot OIDC bootstrap: creates the Propel BFF app and writes .env when
  # credentials are missing. Idempotent — skips when ZITADEL_CLIENT_* already set.
  zitadel-oidc-init:
    image: python:3.12-slim
    container_name: propel-zitadel-oidc-init
    restart: "no"
    depends_on:
      zitadel:
        condition: service_healthy
      zitadel-login:
        condition: service_healthy
    volumes:
      - ${PROPEL_HOST_DIR:-.}:/workspaces/Propel
      - zitadel-bootstrap:/zitadel/bootstrap:ro
    working_dir: /workspaces/Propel
    env_file:
      - path: .env.ingestion.local
        required: false
    environment:
      ZITADEL_INTERNAL_ISSUER: http://zitadel:8080
      ZITADEL_ISSUER: http://localhost:${ZITADEL_PORT:-8080}
      ZITADEL_HOST_HEADER: localhost
      OAUTH_CALLBACK_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
      FRONTEND_BASE_URL: http://localhost:${FRONTEND_PORT:-5173}
      ZITADEL_LOGIN_PORT: ${ZITADEL_LOGIN_PORT:-3002}
    command: ["python3", "scripts/zitadel_bootstrap.py", "--env", "local"]

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: propel-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-oidc-init:
        condition: service_completed_successfully
    env_file:
      - .env
      # Shared dev ingestion creds (GitHub App), pulled from AWS Secrets Manager
      # via scripts/dev-ingestion-secrets.sh. Optional so the stack still starts
      # for anyone who hasn't pulled them.
      - path: .env.ingestion.local
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-propel}:${POSTGRES_PASSWORD:-propel}@postgres:5432/${POSTGRES_DB:-propel}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-propel-backend}
      # Server-side OIDC metadata/token calls use the compose service name.
      ZITADEL_INTERNAL_ISSUER: http://zitadel:8080
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${PROPEL_HOST_DIR:-.}/backend:/app

  # Dagster ingestion scheduler (V2). Same image as `backend`, but runs the
  # combined `dagster dev` (webserver + daemon) from a dedicated Dagster venv.
  # The daemon owns the hourly schedule that calls `app.ingestion.orchestrator`;
  # the UI is at http://localhost:3001. Trigger a run on demand from the UI
  # Launchpad, or `docker compose exec ingestion python -m app.ingestion.cli run`.
  ingestion:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: propel-ingestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
      # GitHub App creds for ingestion runs (see backend service above).
      - path: .env.ingestion.local
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-propel}:${POSTGRES_PASSWORD:-propel}@postgres:5432/${POSTGRES_DB:-propel}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_INGESTION:-propel-ingestion}
      DAGSTER_HOME: /tmp/dagster
      # Embedded Dask scheduler (same container as the Dagster daemon, like
      # prod); org_ingestion_job steps execute on it via dask_executor.
      # Dashboard at http://localhost:8787.
      DASK_SCHEDULER_EMBEDDED: "1"
      DASK_SCHEDULER_ADDRESS: tcp://ingestion:8786
      # dbt connection for manual `docker compose exec ingestion dbt ...` runs;
      # Dagster-launched runs derive the same values from DATABASE_URL.
      DBT_HOST: postgres
      DBT_PORT: "5432"
      DBT_USER: ${POSTGRES_USER:-propel}
      DBT_PASSWORD: ${POSTGRES_PASSWORD:-propel}
      DBT_DBNAME: ${POSTGRES_DB:-propel}
      # Run Dagster from its own venv; import bind-mounted `app` + orchestration.
      PATH: /opt/orchestration-venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      PYTHONPATH: /app:/orchestration
      # The app venv sync and migrations are owned by the `backend` service.
      SKIP_UV_SYNC: "1"
      SKIP_MIGRATIONS: "1"
    ports:
      - "${DAGSTER_PORT:-3001}:3001"
      # Embedded Dask scheduler dashboard.
      - "${DASK_DASHBOARD_PORT:-8787}:8787"
    volumes:
      - ${PROPEL_HOST_DIR:-.}/backend:/app
      - ${PROPEL_HOST_DIR:-.}/orchestration:/orchestration
      # dbt project (transformation/dbt) — Dagster's analytics assets run
      # `dbt build` against it.
      - ${PROPEL_HOST_DIR:-.}/transformation:/transformation
      # Meltano's .meltano (plugin venvs + SQLite systemdb) on a dedicated volume,
      # NOT the bind mount: WAL/locking is reliable on the volume filesystem and it
      # isn't shared with other containers, so no "database is locked" races.
      - meltano-ingestion:/app/meltano/.meltano
    command: ["dagster", "dev", "-h", "0.0.0.0", "-p", "3001", "-w", "/orchestration/workspace.yaml"]

  # Dask worker: executes the Dagster steps (Meltano runs) that the
  # dask_executor submits. Same image + mounts as `ingestion` so steps can
  # import `app`, reach Postgres, and shell out to Meltano. One container with
  # DASK_WORKER_PROCESSES single-threaded worker processes; its own .meltano
  # volume so Meltano's SQLite systemdb is never shared across containers.
  dask-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: propel-dask-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      ingestion:
        condition: service_started
    env_file:
      - .env
      # GitHub App creds for ingestion runs (see backend service above).
      - path: .env.ingestion.local
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-propel}:${POSTGRES_PASSWORD:-propel}@postgres:5432/${POSTGRES_DB:-propel}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME_INGESTION:-propel-ingestion}
      # Scheduler is embedded in the ingestion container.
      DASK_SCHEDULER_ADDRESS: tcp://ingestion:8786
      DASK_WORKER_PROCESSES: "2"
      SKIP_UV_SYNC: "1"
      SKIP_MIGRATIONS: "1"
    volumes:
      - ${PROPEL_HOST_DIR:-.}/backend:/app
      - ${PROPEL_HOST_DIR:-.}/orchestration:/orchestration
      - ${PROPEL_HOST_DIR:-.}/transformation:/transformation
      - meltano-dask-worker:/app/meltano/.meltano
    command: ["dask-worker"]

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: propel-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      VITE_POSTHOG_KEY: ${POSTHOG_TOKEN:-}
      VITE_POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ${PROPEL_HOST_DIR:-.}/frontend:/app

  # Marketing landing site (apex/www in prod). Same image + bind mount as the
  # frontend service, but runs the landing Vite dev server on its own port so
  # both are testable locally. Overrides the Dockerfile's `npm run dev` command.
  frontend-landing:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: propel-frontend-landing
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_POSTHOG_KEY: ${POSTHOG_TOKEN:-}
      VITE_POSTHOG_HOST: ${POSTHOG_HOST:-https://us.i.posthog.com}
      # "Open app" / "Get started" CTAs point at the local app by default.
      VITE_APP_URL: ${VITE_APP_URL:-http://localhost:5173}
    command: ["npm", "run", "dev:landing", "--", "--host", "0.0.0.0"]
    ports:
      - "${FRONTEND_LANDING_PORT:-5174}:5174"
    volumes:
      - ${PROPEL_HOST_DIR:-.}/frontend:/app

  # Serves the prebuilt static landing page (frontend/dist-landing) for local
  # testing. Not part of the default dev stack — start it on demand:
  #   docker compose --profile landing up frontend-landing-static   ->  http://localhost:8080
  frontend-landing-static:
    image: nginx:alpine
    container_name: propel-frontend-landing-static
    restart: unless-stopped
    profiles: ["landing"]
    volumes:
      - ${PROPEL_HOST_DIR:-.}/frontend/dist-landing:/usr/share/nginx/html:ro
      - ${PROPEL_HOST_DIR:-.}/infrastructure/docker/landing-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${LANDING_PORT:-8080}:80"

volumes:
  pgdata:
  zitadel-bootstrap:
  meltano-ingestion:
  meltano-dask-worker:
